<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHT STREAM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: url('https://images.hdqwalls.com/download/night-city-synthwave-retro-8k-7a-1920x1080.jpg') center/cover fixed;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Inter', -apple-system, sans-serif;
  padding: 20px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 20, 0.55);
  backdrop-filter: blur(4px);
  z-index: 0;
}
.player {
  position: relative;
  z-index: 1;
  width: 520px;
  max-width: 96vw;
  background: rgba(10, 14, 30, 0.55);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  padding: 28px 30px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
}
.search-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.search-wrap input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px 18px;
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
.search-wrap input:focus { border-color: rgba(162,155,254,0.4); background: rgba(255,255,255,0.1); }
.search-wrap button {
  background: rgba(108,92,231,0.5);
  border: none;
  border-radius: 14px;
  padding: 0 20px;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
  backdrop-filter: blur(4px);
}
.search-wrap button:hover { background: rgba(108,92,231,0.75); }
.cover {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 18px;
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  margin-bottom: 18px;
  overflow: hidden;
  position: relative;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.cover .placeholder {
  font-size: 72px;
  opacity: 0.4;
}
.track-info { margin-bottom: 14px; }
.track-name { font-size: 18px; font-weight: 600; color: #fff; }
.artist { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin: 16px 0;
}
.btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.play-btn {
  background: rgba(108,92,231,0.6);
  border-color: rgba(108,92,231,0.3);
  color: #fff;
  font-size: 24px;
  width: 58px;
  height: 58px;
  box-shadow: 0 0 40px rgba(108,92,231,0.15);
}
.play-btn:hover { background: rgba(108,92,231,0.8); transform: scale(1.04); }
.progress-wrap { margin: 8px 0; }
progress {
  width: 100%;
  height: 4px;
  border-radius: 4px;
  appearance: none;
  background: rgba(255,255,255,0.08);
  border: none;
  overflow: hidden;
  cursor: pointer;
}
progress::-webkit-progress-bar { background: rgba(255,255,255,0.08); }
progress::-webkit-progress-value { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
progress::-moz-progress-bar { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
.time-row { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 6px; }
.volume-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.volume-row input[type="range"] {
  flex: 1;
  height: 3px;
  appearance: none;
  background: rgba(255,255,255,0.12);
  border-radius: 3px;
  outline: none;
}
.volume-row input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #a29bfe;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(162,155,254,0.3);
}
.results {
  margin-top: 16px;
  max-height: 200px;
  overflow-y: auto;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 10px;
}
.results::-webkit-scrollbar { width: 4px; }
.results::-webkit-scrollbar-thumb { background: rgba(162,155,254,0.3); border-radius: 4px; }
.result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.15s;
}
.result-item:hover { background: rgba(255,255,255,0.06); }
.result-item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
.result-item .ri-title { font-size: 13px; color: rgba(255,255,255,0.8); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-item .ri-artist { font-size: 11px; color: rgba(255,255,255,0.35); }
.now-label { font-size: 11px; color: rgba(162,155,254,0.6); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
.loading-dots::after { content: ''; animation: dots 1s steps(3,end) infinite; }
keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
</style>
</head>
<body>
<div class="player">
  <div class="now-label">✦ Сейчас играет</div>
  <div class="cover" id="coverWrap">
    <span class="placeholder">🎵</span>
  </div>
  <div class="track-info">
    <div class="track-name" id="trackName">Введи поиск</div>
    <div class="artist" id="artistName">и выбери трек</div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Название трека..." />
    <button id="searchBtn">🔍</button>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <div class="controls">
    <button class="btn" id="prevBtn">⏮</button>
    <button class="btn play-btn" id="playBtn">▶</button>
    <button class="btn" id="nextBtn">⏭</button>
  </div>

  <div class="progress-wrap">
    <progress id="progress" value="0" max="100"></progress>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="totalTime">0:00</span>
    </div>
  </div>

  <div class="volume-row">
    <span style="font-size:14px;opacity:0.5;">🔊</span>
    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
  </div>

  <div class="results" id="results"></div>
</div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progress = document.getElementById('progress');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const volume = document.getElementById('volume');
const trackName = document.getElementById('trackName');
const artistName = document.getElementById('artistName');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const results = document.getElementById('results');
const coverWrap = document.getElementById('coverWrap');

let queue = [];
let currentIndex = -1;
let isPlaying = false;

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function setTrack(info) {
  trackName.textContent = info.title || 'Неизвестно';
  artistName.textContent = info.artist || info.channel || '';
  if (info.thumb) {
    coverWrap.innerHTML = `<img src="${info.thumb}" alt="cover">`;
  } else {
    coverWrap.innerHTML = `<span class="placeholder">🎵</span>`;
  }
}

function playTrack(index) {
  if (index < 0 || index >= queue.length) return;
  currentIndex = index;
  const item = queue[index];
  audio.src = item.audioUrl || item.url;
  setTrack(item);
  audio.play().then(() => {
    isPlaying = true;
    playBtn.textContent = '⏸';
  }).catch(() => {
    // maybe need direct link
    audio.src = item.url;
    audio.play().then(() => {
      isPlaying = true;
      playBtn.textContent = '⏸';
    }).catch(e => {
      console.error(e);
    });
  });
}

function togglePlay() {
  if (queue.length === 0) return;
  if (audio.paused) {
    if (currentIndex === -1) { playTrack(0); return; }
    audio.play().then(() => { isPlaying = true; playBtn.textContent = '⏸'; }).catch(e => console.error(e));
  } else {
    audio.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
  }
}

function nextTrack() {
  if (queue.length === 0) return;
  const next = (currentIndex + 1) % queue.length;
  playTrack(next);
}

function prevTrack() {
  if (queue.length === 0) return;
  const prev = (currentIndex - 1 + queue.length) % queue.length;
  playTrack(prev);
}

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.textContent = formatTime(audio.currentTime);
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('ended', nextTrack);

progress.addEventListener('click', (e) => {
  const rect = progress.getBoundingClientRect();
  const pos = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pos * audio.duration;
});

volume.addEventListener('input', () => { audio.volume = volume.value; });

playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', nextTrack);
document.getElementById('prevBtn').addEventListener('click', prevTrack);

// YouTube search via public API
async function searchYouTube(query) {
  try {
    const resp = await fetch(`https://youtube-search-api-psi.vercel.app/api/search?query=${encodeURIComponent(query)}`);
    const data = await resp.json();
    return data.items || data.results || data;
  } catch (e) {
    // fallback
    try {
      const resp2 = await fetch(`https://yt-api.cyclic.app/api/search?query=${encodeURIComponent(query)}`);
      const data2 = await resp2.json();
      return data2.items || data2.results || data2;
    } catch(e2) {
      return [];
    }
  }
}

function renderResults(items) {
  results.innerHTML = '';
  if (!items || items.length === 0) {
    results.innerHTML = '<div style="opacity:0.3;text-align:center;padding:10px;font-size:13px;">ничего не нашлось :(</div>';
    return;
  }
  items.slice(0, 12).forEach((item, idx) => {
    const title = item.title || item.name || 'Unknown';
    const channel = item.channelTitle || item.artist || item.channel || '';
    const thumb = item.thumbnail ? (item.thumbnail.url || item.thumbnail) : (item.thumb || '');
    const id = item.id || item.videoId;
    const url = id ? (typeof id === 'string' ? `https://www.youtube.com/watch?v=${id}` : (id.videoId ? `https://www.youtube.com/watch?v=${id.videoId}` : '')) : '';

    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <img src="${thumb || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="%23333"><rect width="40" height="40" rx="6"/></svg>'}" alt="">
      <div>
        <div class="ri-title">${title}</div>
        <div class="ri-artist">${channel}</div>
      </div>
    `;
    div.addEventListener('click', async () => {
      // add to queue and play
      const trackInfo = {
        title: title,
        artist: channel,
        thumb: thumb,
        url: url,
        audioUrl: url
      };
      queue.push(trackInfo);
      renderQueue();
      playTrack(queue.length - 1);
      results.innerHTML = '';
      searchInput.value = '';
    });
    results.appendChild(div);
  });
}

function renderQueue() {
  // highlight current in results if needed
}

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  results.innerHTML = '<div style="text-align:center;padding:10px;opacity:0.4;">ищу...</div>';
  const items = await searchYouTube(q);
  renderResults(items);
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

// keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
});
</script>
</body>
</html>
