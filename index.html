            if (r.ok) { activeInstance = inst; return true; }

async function search() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;

    res.innerHTML = '⏳ загрузка...

    if (!activeInstance) {
        const ok = await findInstance();

            res.innerHTML = '✕ зеркала недоступны

        }
        document.getElementById('status').textContent = activeInstance.replace('https://','');
    }

        const videos = data.filter(v => v.videoId);
        if (!videos.length) {
            res.innerHTML = 'ничего не нашлось

            return;
        }
        res.innerHTML = '';
