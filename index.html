<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lite Music</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:system-ui,sans-serif; background:#0a0a0a; color:#eee; display:flex; justify-content:center; padding:20px; }
.container { max-width:520px; width:100%; }
h2 { text-align:center; margin:0 0 16px; font-size:24px; }
input, button { width:100%; padding:12px 16px; border:none; border-radius:30px; font-size:15px; margin:4px 0; }
input { background:#1a1a1a; color:#eee; outline:1px solid #333; }
input:focus { outline-color:#1db954; }
button { background:#1db954; color:#fff; font-weight:700; cursor:pointer; }
button:hover { background:#169c46; }
#results { margin-top:12px; }
.item { background:#141414; padding:10px 14px; margin:5px 0; border-radius:8px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:.15s; }
.item:hover { background:#1e1e1e; }
.item img { width:48px; height:48px; border-radius:4px; object-fit:cover; }
.item .ttl { font-size:14px; font-weight:500; }
.item .art { font-size:12px; color:#888; }
#player { display:none; margin:12px 0; }
audio { width:100%; border-radius:30px; }
#status { text-align:center; font-size:13px; color:#666; margin:8px 0; min-height:20px; }
.now { text-align:center; font-size:14px; color:#1db954; margin:6px 0; min-height:20px; }
.loading { text-align:center; padding:20px; color:#888; }
.err { text-align:center; padding:20px; color:#f55; }
</style>
</head>
<body>

    🎧 litemusic
    <input type="text" id="q" placeholder="Песня, исполнитель..." autofocus />
    <button onclick="search()">Искать</button>
    🔍 поиск через YouTube без рекламы

    <audio id="a" controls autoplay></audio>

<script>
// Зеркала Invidious, которые обычно работают в РФ
const instances = [
    'https://invidious.projectsegfau.lt',
    'https://yewtu.be',
    'https://inv.vern.cc',
    'https://inv.bp.projectsegfau.lt',
    'https://invidious.no-logs.com',
    'https://invidious.private.coffee',
    'https://inv.bp.private.coffee',
    'https://invidious.sethforprivacy.com'
];

let activeInstance = '';
let searchResults = [];

async function findWorkingInstance() {
    for (const inst of instances) {
        try {
            const resp = await fetch(${inst}/api/v1/stats, { signal: AbortSignal.timeout(3000) });
            if (resp.ok) { activeInstance = inst; return true; }
        } catch(e) {}
    }
    return false;
}

async function search() {
    const query = document.getElementById('q').value.trim();
    if (!query) return;

    const resDiv = document.getElementById('results');
    resDiv.innerHTML = '⏳ Ищем...
';

    if (!activeInstance) {
        const found = await findWorkingInstance();
        if (!found) {
            resDiv.innerHTML = '❌ Ни одно зеркало не ответило. Попробуй позже или смени провайдера.
';
            return;
        }
[09.07.2026 8:51] Gemini: document.getElementById('status').textContent = ✅ ${activeInstance.replace('https://','')};
    }

    try {
        const resp = await fetch(${activeInstance}/api/v1/search?q=${encodeURIComponent(query)}&type=video);
        const data = await resp.json();
        const videos = data.filter(v => v.videoId);

        if (videos.length === 0) {
            resDiv.innerHTML = 'Ничего не нашлось
';
            return;
        }

        searchResults = videos;
        resDiv.innerHTML = '';
        videos.slice(0, 20).forEach(v => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="https://img.youtube.com/vi/${v.videoId}/default.jpg" loading="lazy" />

                    ${v.title}

                    ${v.author}

            `;
            div.onclick = () => playTrack(v.videoId, v.title, v.author);
            resDiv.appendChild(div);
        });
    } catch(e) {
        activeInstance = ''; // сбрасываем, при следующем поиске найдёт новое
        resDiv.innerHTML = '❌ Ошибка соединения. Попробуй ещё раз.
';
    }
}

async function playTrack(id, title, author) {
    document.getElementById('now').textContent = 🎵 ${title} — ${author};
    document.getElementById('player').style.display = 'block';
    const audio = document.getElementById('a');
    audio.src = '';

    try {
        const resp = await fetch(${activeInstance}/api/v1/videos/${id});
        const data = await resp.json();
        const streams = data.audioStreams || [];
        const best = streams.sort((a,b) => (b.bitrate0) - (a.bitrate0))[0];

        if (best) {
            audio.src = best.url;
            audio.play().catch(() => {});
        } else {
            document.getElementById('now').textContent = '❌ Нет аудиопотока';
        }
    } catch(e) {
        document.getElementById('now').textContent = '❌ Ошибка загрузки';
    }
}

// enter для поиска
document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
</script>
</body>
</html>
